# totan configuration for the eBPF e2e CI test.
# toolkit/e2e/run.sh ebpf creates the pod netns + host-side veth and spawns
# three mock proxies (8880/8881/8882) before starting totan here.

listen_port = 3129

# Fallback when PAC returns DIRECT or fails to load.
default_proxy = "http://127.0.0.1:8880"

# PAC is the primary routing policy under test. $PAC_PATH is substituted by
# run.sh at startup with the absolute path to toolkit/e2e/test.pac.
pac_file = "__PAC_PATH__"

interception_mode = "ebpf"

[logging]
level = "debug"
format = "text"

[timeouts]
upstream_connect_ms = 5000

[mitigation]
retry_attempts = 1
retry_backoff_ms = 100
rst_on_failure = true
try_direct_on_proxy_failure = false

[ebpf]
# Host side of the veth pair carrying pod traffic — the tc ingress classifier
# picks up pod-originated SYNs here and sk_assigns them to the TPROXY listener.
ingress_interfaces = ["veth-host"]
tproxy_port = 3129
# Set on sk_assign'd packets; the loader installs
# `ip rule fwmark <N> lookup 100` + `ip route local 0.0.0.0/0 dev lo table 100`
# so marked packets get delivered locally regardless of their dst IP.
fwmark = 0x7474
