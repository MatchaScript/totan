name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── fast checks on the default (netfilter-only) feature set ─────────────────
  check:
    name: Check & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace --exclude totan-ebpf
      - name: Clippy
        run: cargo clippy --workspace --exclude totan-ebpf -- -D warnings
      # totan-ebpf targets bpfel-unknown-none and requires nightly; it is
      # compiled in the `ebpf-build` job below.
      - name: Test
        run: cargo test --workspace --exclude totan-ebpf

  # ── build the default (netfilter) release binary reused by e2e-netfilter ───
  build-netfilter:
    name: Build (netfilter)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build totan (netfilter)
        run: cargo build -p totan --release
      - uses: actions/upload-artifact@v4
        with:
          name: totan-netfilter-release
          path: target/release/totan
          retention-days: 1

  # ── compile the eBPF crate + userspace loader; publish as artifact ─────────
  build-ebpf:
    name: Build (eBPF)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # The nightly channel pinned in totan-ebpf/rust-toolchain.toml that
      # aya-build invokes via `rustup run`.
      - name: Install nightly-2025-02-20 for the eBPF crate
        run: rustup toolchain install nightly-2025-02-20 --component rust-src --no-self-update

      # bpf-linker takes ~5 min to build from source; cache the installed bin.
      - name: Cache bpf-linker
        id: cache-bpf-linker
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/bpf-linker
          key: bpf-linker-${{ runner.os }}-v1

      - name: Install bpf-linker
        if: steps.cache-bpf-linker.outputs.cache-hit != 'true'
        run: cargo install bpf-linker --locked

      - uses: Swatinem/rust-cache@v2

      - name: Build totan (with eBPF)
        run: cargo build -p totan --features ebpf --release

      - uses: actions/upload-artifact@v4
        with:
          name: totan-ebpf-release
          path: target/release/totan
          retention-days: 1

  # ── functional e2e: netfilter mode (iptables REDIRECT + SO_ORIGINAL_DST) ───
  # Shares scenarios with e2e-ebpf via toolkit/e2e/run.sh.
  e2e-netfilter:
    name: E2E (netfilter, PAC routing)
    runs-on: ubuntu-24.04
    needs: build-netfilter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: totan-netfilter-release
          path: target/release/
      - name: Make totan executable
        run: chmod +x target/release/totan
      - name: Install nftables
        run: sudo apt-get update && sudo apt-get install -y nftables
      - name: Run netfilter e2e
        run: sudo --preserve-env=PATH bash toolkit/e2e/run.sh netfilter

  # ── functional e2e: eBPF mode (tcx + bpf_sk_assign TPROXY) ─────────────────
  # Requires kernel ≥ 6.6 for tcx; ubuntu-24.04 runner has kernel 6.8.
  e2e-ebpf:
    name: E2E (eBPF, PAC routing)
    runs-on: ubuntu-24.04
    needs: build-ebpf
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: totan-ebpf-release
          path: target/release/
      - name: Make totan executable
        run: chmod +x target/release/totan
      - name: Verify kernel version
        run: |
          echo "kernel: $(uname -r)"
          uname -r | awk -F. '{exit !(($1 > 6) || ($1 == 6 && $2 >= 6))}'
      - name: Run eBPF e2e
        run: sudo --preserve-env=PATH bash toolkit/e2e/run.sh ebpf
